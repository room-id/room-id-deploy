networks:
  internal_backend:
    internal: true
  public:
    internal: false

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: roomid-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${LETSENCRYPT_PATH}:/etc/letsencrypt
      - ${CERTBOT_WWW_PATH}:/var/www/certbot
    networks:
      - public
      - internal_backend

  certbot:
    image: certbot/certbot:latest
    container_name: roomid-certbot
    volumes:
      - ${LETSENCRYPT_PATH}:/etc/letsencrypt
      - ${CERTBOT_WWW_PATH}:/var/www/certbot
    networks:
      - public

  certbot-renew:
    image: certbot/certbot:latest
    container_name: roomid-certbot-renew
    restart: unless-stopped
    volumes:
      - ${LETSENCRYPT_PATH}:/etc/letsencrypt
      - ${CERTBOT_WWW_PATH}:/var/www/certbot
    networks:
      - public
      - internal_backend
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

  frontend:
    image: ghcr.io/room-id/room-id-frontend:latest
    container_name: roomid-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_GOOGLE_API_KEY: ${NEXT_PUBLIC_GOOGLE_API_KEY}
      NEXT_PUBLIC_RESEND_API_KEY: ${NEXT_PUBLIC_RESEND_API_KEY}
      NEXT_PUBLIC_SECURITY_SERVICE_URL: "https://login.room-id.nl"
      NEXT_PUBLIC_BACKEND_URL: "https://backend.room-id.nl"
    networks:
      - internal_backend

  jwt-server:
    image: ghcr.io/room-id/jwt-server:latest
    container_name: roomid-jwt-server
    restart: unless-stopped
    depends_on:
      - mongo
    expose:
      - "4001"
    environment:
      API_PORT: "4001"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "webtoken"
      MONGO_COLLECTION: "users"
      MONGO_ORGANIZATION: "organization"
      TOKEN_KEY: ${JWT_TOKEN_KEY}
      TOKEN_EXPIRES_IN: "60min"
    networks:
      - internal_backend

  guard:
    image: ghcr.io/room-id/room-id-guard:latest
    container_name: roomid-guard
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      MODEL_PATH: /models/yolov8n.pt
      CONF_THRESHOLD: "0.30"
      IMG_SIZE: "480"
    volumes:
      - ${UPLOADS_PATH}:/uploads
      - ${GUARD_MODELS_PATH}:/models:ro
    networks:
      - internal_backend
      

  backend:
    image: ghcr.io/room-id/room-id-backend:latest
    container_name: roomid-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - qdrant
      - guard
    expose:
      - "8080"
    environment:
      SHARED_SECRET: ${SHARED_SECRET}
      MONGO_URI: "mongodb://mongo:27017/roomid"
      QDRANT_URL: "http://qdrant:6333"
      GEOCODE_API_KEY: ${GEOCODE_API_KEY}
      UPLOAD_DIR: "/app/uploads"
      HOME: "/app"
      GUARD_URL: "http://guard:8000"
      GUARD_TIMEOUT_MS: "1500"
      GUARD_UPLOADS_PREFIX_GUARD: "/uploads"
    volumes:
      - ${UPLOADS_PATH}:/app/uploads
      - ./model-cache:/app/.cache
    networks:
      internal_backend:
        aliases:
          - backend-internal
      public: {}


  mongo:
    image: mongo:7
    container_name: roomid-mongo
    restart: unless-stopped
    volumes:
      - ${MONGO_PATH}:/data/db
    environment:
      MONGO_INITDB_DATABASE: roomid

    command: [ "mongod", "--bind_ip_all" ]
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - internal_backend

  qdrant:
    image: qdrant/qdrant:latest
    container_name: roomid-qdrant
    restart: unless-stopped
    volumes:
      - ${QDRANT_PATH}:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    networks:
      - internal_backend
